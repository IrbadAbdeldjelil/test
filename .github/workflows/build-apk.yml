name: Build Expo APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Setup EAS
        run: npm install -g eas-cli
      
      - name: Build with EAS
        run: eas build -p android --local --non-interactive
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: '**/*.apk'
